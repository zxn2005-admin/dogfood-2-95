<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吃糖豆小游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>吃糖豆</h1>
            <div class="score-board">
                <span>得分: <span id="score">0</span></span>
                <span>剩余糖豆: <span id="remaining">0</span></span>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="game-info">
            <p>使用方向键 ↑↓←→ 控制移动</p>
        </div>
    </div>
    
    <!-- 游戏状态遮罩层 -->
    <div id="gameOverlay" class="overlay">
        <div class="overlay-content">
            <h2 id="overlayTitle">按任意方向键开始游戏</h2>
            <p id="overlayMessage">收集所有糖豆，避开敌人！</p>
            <p id="overlayHint" class="hint">按空格键重新开始</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
